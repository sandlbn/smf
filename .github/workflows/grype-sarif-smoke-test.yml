# Temporary workflow to validate Grype SARIF upload in forks.
name: Grype SARIF Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom-source:
    permissions:
      contents: read
      actions: read
    uses: sandlbn/.github/.github/workflows/sbom-source.yml@6c764b26875f4e07e189b27d1ff3adff59cc82f3
    with:
      changed: "true"
      branch_name: ${{ github.ref }}
      artifact_name: grype-sarif-smoke-${{ github.run_id }}.spdx.json
      sbom_format: spdx-json
      path: .

  grype-scan:
    needs: sbom-source
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: sandlbn/.github/.github/workflows/grype-scan.yml@6c764b26875f4e07e189b27d1ff3adff59cc82f3
    with:
      changed: "true"
      artifact_name: grype-sarif-smoke-${{ github.run_id }}.spdx.json
      upload_sarif: true
      output_format: sarif
      fail_build: false
